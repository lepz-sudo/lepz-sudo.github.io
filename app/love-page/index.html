  <script>
    // ---------- Floating hearts ----------
    const heartsContainer = document.getElementById('hearts');
    const colors = ['#ff4d6d', '#ff8fa3', '#ffb3c1', '#c9184a', '#ff6b8a'];

    function spawnHeart() {
      const h = document.createElement('div');
      h.className = 'float-heart';
      const size = 14 + Math.random() * 22;
      const left = Math.random() * 100;
      const dur = 6 + Math.random() * 7;
      const color = colors[Math.floor(Math.random() * colors.length)];
      h.style.left = left + 'vw';
      h.style.width = size + 'px';
      h.style.height = size + 'px';
      h.style.animationDuration = dur + 's';
      h.style.setProperty('--c', color);
      h.innerHTML = '<span class=\"square\"></span>';
      // recolor pseudo via inline style trick: set background via CSS variable
      h.querySelector('.square').style.background = color;
      // also recolor the ::before/::after via style sheet rule per element
      const styleId = 'fh-' + Math.random().toString(36).slice(2, 8);
      h.setAttribute('data-id', styleId);
      const s = document.createElement('style');
      s.textContent = `
        .float-heart[data-id=\"${styleId}\"]::before,
        .float-heart[data-id=\"${styleId}\"]::after { background: ${color}; }
      `;
      document.head.appendChild(s);
      heartsContainer.appendChild(h);

      setTimeout(() => {
        h.remove();
        s.remove();
      }, dur * 1000 + 200);
    }

    let heartInterval = null;
    function startHearts() {
      if (heartInterval) return;
      heartInterval = setInterval(spawnHeart, 380);
      // initial burst
      for (let i = 0; i < 8; i++) setTimeout(spawnHeart, i * 120);
    }

    // ---------- Music (Web Audio API romantic melody) ----------
    let audioCtx = null;
    let musicOn = false;
    let melodyTimer = null;

    // A simple, soft romantic melody (notes in Hz)
    // Inspired by a gentle waltz progression
    const melody = [
      { f: 392.00, d: 0.5 }, // G4
      { f: 523.25, d: 0.5 }, // C5
      { f: 659.25, d: 0.5 }, // E5
      { f: 587.33, d: 0.75 }, // D5
      { f: 523.25, d: 0.5 }, // C5
      { f: 493.88, d: 0.5 }, // B4
      { f: 440.00, d: 0.75 }, // A4
      { f: 392.00, d: 0.5 }, // G4
      { f: 349.23, d: 0.5 }, // F4
      { f: 392.00, d: 0.5 }, // G4
      { f: 440.00, d: 0.5 }, // A4
      { f: 392.00, d: 1.0 }, // G4
    ];

    function playNote(ctx, freq, startTime, duration) {
      // Main tone
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;

      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(0.18, startTime + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      // Soft chord harmonic (perfect fifth, low volume)
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'triangle';
      osc2.frequency.value = freq * 1.5;
      gain2.gain.setValueAtTime(0, startTime);
      gain2.gain.linearRampToValueAtTime(0.05, startTime + 0.05);
      gain2.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      // Reverb-ish: soft lowpass
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 2400;

      osc.connect(gain).connect(filter).connect(ctx.destination);
      osc2.connect(gain2).connect(filter);

      osc.start(startTime);
      osc2.start(startTime);
      osc.stop(startTime + duration + 0.05);
      osc2.stop(startTime + duration + 0.05);
    }

    function scheduleMelody() {
      if (!audioCtx || !musicOn) return;
      const now = audioCtx.currentTime + 0.05;
      let t = now;
      melody.forEach(n => {
        playNote(audioCtx, n.f, t, n.d);
        t += n.d;
      });
      const totalDur = (t - now) * 1000;
      melodyTimer = setTimeout(scheduleMelody, totalDur + 400);
    }

    function startMusic() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      musicOn = true;
      document.getElementById('musicLabel').textContent = 'MUSIC ON';
      scheduleMelody();
    }

    function stopMusic() {
      musicOn = false;
      if (melodyTimer) { clearTimeout(melodyTimer); melodyTimer = null; }
      if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
      document.getElementById('musicLabel').textContent = 'MUSIC OFF';
    }

    // ---------- Heart click → burst ----------
    document.getElementById('heartWrap').addEventListener('click', () => {
      for (let i = 0; i < 14; i++) setTimeout(spawnHeart, i * 60);

        playNote(audioCtx, 880, t, 0.4);
        playNote(audioCtx, 1318.5, t + 0.08, 0.4);

    });

    // ---------- Music button ----------
    document.getElementById('musicBtn').addEventListener('click', () => {
      if (musicOn) stopMusic(); else startMusic();
    });

    // ---------- Start overlay ----------
    document.getElementById('startBtn').addEventListener('click', () => {
      document.getElementById('overlay').classList.add('hidden');
      startHearts();
      startMusic();
    });
